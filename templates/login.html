{% extends 'base.html' %}
{% block title %}Login - LoanRiskAI{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card auth-card shadow-sm mt-5">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <i class="fa-solid fa-shield-halved fa-2x text-primary"></i>
          <h3 class="mt-2 fw-bold">Welcome Back</h3>
          <p class="text-muted">Login to LoanRisk<span class="text-primary fw-bold">AI</span></p>
        </div>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Username or Email</label>
            <input type="text" class="form-control" name="username" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" name="password" required>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2"><i class="fa-solid fa-right-to-bracket"></i> Login</button>
        </form>
        <p class="text-center mt-3 mb-0">Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
